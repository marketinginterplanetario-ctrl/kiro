<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoStudio Pro - Editor de Fotos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f0f;color:#e0e0e0;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1a1a2e}
::-webkit-scrollbar-thumb{background:#667eea;border-radius:3px}
.topbar{height:48px;background:#1a1a2e;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #2a2a4a;justify-content:space-between;z-index:100}
.topbar h1{font-size:16px;font-weight:600;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-actions{display:flex;gap:8px}
.topbar-actions button{background:#2a2a4a;border:none;color:#e0e0e0;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.topbar-actions button:hover{background:#667eea}
.main-layout{display:flex;height:calc(100vh - 48px)}
.sidebar{width:64px;background:#1a1a2e;border-right:1px solid #2a2a4a;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px}
.sidebar button{width:48px;height:48px;border:none;background:transparent;color:#888;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:18px}
.sidebar button:hover{background:#2a2a4a;color:#e0e0e0}
.sidebar button.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.sidebar button svg{width:22px;height:22px}
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#0a0a0a}
.canvas-container{position:relative;max-width:100%;max-height:100%}
#mainCanvas{display:block;max-width:100%;max-height:calc(100vh - 80px);object-fit:contain;border-radius:4px}
#maskCanvas{position:absolute;top:0;left:0;pointer-events:none;border-radius:4px}
.panel-right{width:280px;background:#1a1a2e;border-left:1px solid #2a2a4a;padding:16px;overflow-y:auto;display:none}
.panel-right.visible{display:block}
.panel-right h3{font-size:13px;font-weight:600;margin-bottom:12px;color:#667eea;text-transform:uppercase;letter-spacing:.5px}
.panel-section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #2a2a4a}
.panel-section:last-child{border-bottom:none}
.slider-group{margin-bottom:12px}
.slider-group label{display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-bottom:4px}
.slider-group input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:#2a2a4a;border-radius:2px;outline:none}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#667eea;border-radius:50%;cursor:pointer}
.btn{width:100%;padding:10px;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;margin-bottom:8px}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:#2a2a4a;color:#e0e0e0}
.btn-secondary:hover{background:#3a3a5a}
.btn-small{padding:8px 12px;font-size:11px;width:auto;margin:0}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.filter-btn{padding:10px 8px;background:#2a2a4a;border:none;border-radius:8px;color:#e0e0e0;font-size:11px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.filter-btn:hover{background:#667eea;transform:scale(1.02)}
.drop-zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,15,15,.95);z-index:50}
.drop-zone-inner{border:2px dashed #667eea;border-radius:16px;padding:60px;text-align:center;cursor:pointer;transition:all .3s}
.drop-zone-inner:hover{border-color:#764ba2;background:rgba(102,126,234,.05)}
.drop-zone-inner svg{width:64px;height:64px;color:#667eea;margin-bottom:16px}
.drop-zone-inner h2{font-size:18px;font-weight:600;margin-bottom:8px}
.drop-zone-inner p{font-size:13px;color:#888}
.toast-container{position:fixed;top:60px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;font-size:12px;animation:slideIn .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.success{border-color:#4caf50}
.toast.error{border-color:#f44336}
.toast.info{border-color:#667eea}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.loading-overlay{position:absolute;inset:0;background:rgba(10,10,10,.8);display:flex;align-items:center;justify-content:center;z-index:60;border-radius:4px}
.spinner{width:40px;height:40px;border:3px solid #2a2a4a;border-top-color:#667eea;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.brush-cursor{position:fixed;pointer-events:none;border:2px solid rgba(255,0,0,.7);border-radius:50%;z-index:200;display:none}
#fileInput{display:none}
</style>
</head>
<body>
<div class="topbar">
  <h1>PhotoStudio Pro</h1>
  <div class="topbar-actions">
    <button onclick="undo()" title="Deshacer (Ctrl+Z)">&#8630; Deshacer</button>
    <button onclick="redo()" title="Rehacer (Ctrl+Shift+Z)">&#8631; Rehacer</button>
    <button onclick="exportImage()" title="Exportar (Ctrl+S)">&#11015; Exportar</button>
  </div>
</div>
<div class="main-layout">
  <div class="sidebar">
    <button onclick="setTool('adjust')" id="btn-adjust" title="Ajustes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    </button>
    <button onclick="setTool('removebg')" id="btn-removebg" title="Eliminar Fondo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/><path d="M15 15l3 3M15 18l3-3"/></svg>
    </button>
    <button onclick="setTool('inpaint')" id="btn-inpaint" title="Eliminar Objetos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
    <button onclick="setTool('enhance')" id="btn-enhance" title="Mejorar Calidad">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9"/></svg>
    </button>
    <button onclick="setTool('filters')" id="btn-filters" title="Filtros">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22,3 2,3 10,12.46 10,19 14,21 14,12.46"/></svg>
    </button>
  </div>
  <div class="canvas-area" id="canvasArea">
    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-inner" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <h2>Arrastra una imagen aqui</h2>
        <p>o haz clic para seleccionar un archivo</p>
      </div>
    </div>
    <div class="canvas-container" id="canvasContainer" style="display:none">
      <canvas id="mainCanvas"></canvas>
      <canvas id="maskCanvas"></canvas>
    </div>
  </div>
  <div class="panel-right" id="panelRight">
    <div id="panelContent"></div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<div class="brush-cursor" id="brushCursor"></div>
<input type="file" id="fileInput" accept="image/*">
<script>
// State
let canvas, ctx, maskCanvas, maskCtx;
let originalImage = null;
let currentImage = null;
let historyStack = [];
let historyIndex = -1;
let currentTool = null;
let isPainting = false;
let brushSize = 20;
let maskData = null;

// Init
window.addEventListener('DOMContentLoaded', function() {
  canvas = document.getElementById('mainCanvas');
  ctx = canvas.getContext('2d', {willReadFrequently: true});
  maskCanvas = document.getElementById('maskCanvas');
  maskCtx = maskCanvas.getContext('2d', {willReadFrequently: true});
  setupDragDrop();
  setupKeyboard();
  document.getElementById('fileInput').addEventListener('change', function(e) {
    if (e.target.files[0]) loadImage(e.target.files[0]);
  });
});

function setupDragDrop() {
  var area = document.getElementById('canvasArea');
  area.addEventListener('dragover', function(e) { e.preventDefault(); });
  area.addEventListener('drop', function(e) {
    e.preventDefault();
    if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
  });
}

function setupKeyboard() {
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    if (e.ctrlKey && e.key === 'Z') { e.preventDefault(); redo(); }
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); exportImage(); }
  });
}

function loadImage(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      originalImage = img;
      canvas.width = img.width;
      canvas.height = img.height;
      maskCanvas.width = img.width;
      maskCanvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      currentImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
      historyStack = [cloneImageData(currentImage)];
      historyIndex = 0;
      document.getElementById('dropZone').style.display = 'none';
      document.getElementById('canvasContainer').style.display = 'block';
      fitCanvas();
      showToast('Imagen cargada correctamente', 'success');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function fitCanvas() {
  var container = document.getElementById('canvasContainer');
  container.style.display = 'block';
  canvas.style.maxWidth = '100%';
  canvas.style.maxHeight = 'calc(100vh - 80px)';
  maskCanvas.style.width = canvas.offsetWidth + 'px';
  maskCanvas.style.height = canvas.offsetHeight + 'px';
}

function cloneImageData(imageData) {
  return new ImageData(new Uint8ClampedArray(imageData.data), imageData.width, imageData.height);
}

function pushHistory() {
  currentImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
  historyStack = historyStack.slice(0, historyIndex + 1);
  historyStack.push(cloneImageData(currentImage));
  historyIndex++;
  if (historyStack.length > 30) { historyStack.shift(); historyIndex--; }
}

function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    ctx.putImageData(historyStack[historyIndex], 0, 0);
    currentImage = cloneImageData(historyStack[historyIndex]);
    showToast('Deshacer', 'info');
  }
}

function redo() {
  if (historyIndex < historyStack.length - 1) {
    historyIndex++;
    ctx.putImageData(historyStack[historyIndex], 0, 0);
    currentImage = cloneImageData(historyStack[historyIndex]);
    showToast('Rehacer', 'info');
  }
}

function exportImage() {
  if (!currentImage) return;
  var link = document.createElement('a');
  link.download = 'photo_edited.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Imagen exportada', 'success');
}

function showToast(msg, type) {
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

function showLoading() {
  var el = document.createElement('div');
  el.className = 'loading-overlay';
  el.id = 'loadingOverlay';
  el.innerHTML = '<div class="spinner"></div>';
  document.getElementById('canvasContainer').appendChild(el);
}

function hideLoading() {
  var el = document.getElementById('loadingOverlay');
  if (el) el.remove();
}
// Tool selection
function setTool(tool) {
  if (!currentImage) { showToast('Carga una imagen primero', 'error'); return; }
  currentTool = tool;
  document.querySelectorAll('.sidebar button').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('btn-' + tool);
  if (btn) btn.classList.add('active');
  var panel = document.getElementById('panelRight');
  panel.classList.add('visible');
  clearMask();
  disablePainting();
  if (tool === 'adjust') showAdjustPanel();
  else if (tool === 'removebg') showRemoveBgPanel();
  else if (tool === 'inpaint') showInpaintPanel();
  else if (tool === 'enhance') showEnhancePanel();
  else if (tool === 'filters') showFiltersPanel();
}

function clearMask() {
  maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
  maskData = null;
}

// === ADJUST PANEL ===
function showAdjustPanel() {
  document.getElementById('panelContent').innerHTML =
    '<h3>Ajustes Manuales</h3>' +
    '<div class="panel-section">' +
    '<div class="slider-group"><label><span>Brillo</span><span id="val-brightness">0</span></label>' +
    '<input type="range" min="-100" max="100" value="0" oninput="applyAdjustments(this)"></div>' +
    '<div class="slider-group"><label><span>Contraste</span><span id="val-contrast">0</span></label>' +
    '<input type="range" min="-100" max="100" value="0" oninput="applyAdjustments(this)"></div>' +
    '<div class="slider-group"><label><span>Saturacion</span><span id="val-saturation">0</span></label>' +
    '<input type="range" min="-100" max="100" value="0" oninput="applyAdjustments(this)"></div>' +
    '<div class="slider-group"><label><span>Temperatura</span><span id="val-temperature">0</span></label>' +
    '<input type="range" min="-100" max="100" value="0" oninput="applyAdjustments(this)"></div>' +
    '</div>' +
    '<button class="btn btn-primary" onclick="commitAdjustments()">Aplicar Ajustes</button>' +
    '<button class="btn btn-secondary" onclick="resetAdjustments()">Restablecer</button>';
}

function applyAdjustments() {
  var sliders = document.querySelectorAll('#panelContent input[type=range]');
  var brightness = parseInt(sliders[0].value);
  var contrast = parseInt(sliders[1].value);
  var saturation = parseInt(sliders[2].value);
  var temperature = parseInt(sliders[3].value);
  document.getElementById('val-brightness').textContent = brightness;
  document.getElementById('val-contrast').textContent = contrast;
  document.getElementById('val-saturation').textContent = saturation;
  document.getElementById('val-temperature').textContent = temperature;

  var src = historyStack[historyIndex];
  var imgData = cloneImageData(src);
  var d = imgData.data;
  var contrastF = (259 * (contrast + 255)) / (255 * (259 - contrast));

  for (var i = 0; i < d.length; i += 4) {
    var r = d[i], g = d[i+1], b = d[i+2];
    // Brightness
    r += brightness; g += brightness; b += brightness;
    // Contrast
    r = contrastF * (r - 128) + 128;
    g = contrastF * (g - 128) + 128;
    b = contrastF * (b - 128) + 128;
    // Temperature
    r += temperature * 0.5;
    b -= temperature * 0.5;
    // Saturation
    var gray = 0.2989 * r + 0.587 * g + 0.114 * b;
    var satF = 1 + saturation / 100;
    r = gray + satF * (r - gray);
    g = gray + satF * (g - gray);
    b = gray + satF * (b - gray);
    d[i] = Math.max(0, Math.min(255, r));
    d[i+1] = Math.max(0, Math.min(255, g));
    d[i+2] = Math.max(0, Math.min(255, b));
  }
  ctx.putImageData(imgData, 0, 0);
}

function commitAdjustments() {
  pushHistory();
  showToast('Ajustes aplicados', 'success');
}

function resetAdjustments() {
  var sliders = document.querySelectorAll('#panelContent input[type=range]');
  sliders.forEach(function(s) { s.value = 0; });
  ctx.putImageData(historyStack[historyIndex], 0, 0);
  applyAdjustments();
}
// === REMOVE BACKGROUND ===
function showRemoveBgPanel() {
  document.getElementById('panelContent').innerHTML =
    '<h3>Eliminar Fondo</h3>' +
    '<div class="panel-section">' +
    '<p style="font-size:11px;color:#aaa;margin-bottom:12px">Detecta el color dominante de los bordes y lo hace transparente. Ajusta la tolerancia para mejores resultados.</p>' +
    '<div class="slider-group"><label><span>Tolerancia</span><span id="val-tolerance">30</span></label>' +
    '<input type="range" min="5" max="100" value="30" id="toleranceSlider" oninput="document.getElementById(\'val-tolerance\').textContent=this.value"></div>' +
    '<div class="slider-group"><label><span>Suavizado de bordes</span><span id="val-feather">2</span></label>' +
    '<input type="range" min="0" max="10" value="2" id="featherSlider" oninput="document.getElementById(\'val-feather\').textContent=this.value"></div>' +
    '</div>' +
    '<button class="btn btn-primary" onclick="removeBackground()">Eliminar Fondo</button>' +
    '<button class="btn btn-secondary" onclick="resetToHistory()">Deshacer Cambio</button>';
}

function removeBackground() {
  showLoading();
  setTimeout(function() {
    var tolerance = parseInt(document.getElementById('toleranceSlider').value);
    var feather = parseInt(document.getElementById('featherSlider').value);
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data;
    var w = canvas.width, h = canvas.height;

    // Sample border colors (top, bottom, left, right edges)
    var samples = [];
    for (var x = 0; x < w; x += 2) {
      samples.push([d[x*4], d[x*4+1], d[x*4+2]]);
      var bi = ((h-1)*w+x)*4;
      samples.push([d[bi], d[bi+1], d[bi+2]]);
    }
    for (var y = 0; y < h; y += 2) {
      var li = (y*w)*4;
      samples.push([d[li], d[li+1], d[li+2]]);
      var ri = (y*w+w-1)*4;
      samples.push([d[ri], d[ri+1], d[ri+2]]);
    }

    // Find dominant color using simple averaging
    var rSum=0, gSum=0, bSum=0;
    for (var s=0; s<samples.length; s++) {
      rSum += samples[s][0]; gSum += samples[s][1]; bSum += samples[s][2];
    }
    var bgR = rSum/samples.length, bgG = gSum/samples.length, bgB = bSum/samples.length;

    // Flood fill from corners
    var visited = new Uint8Array(w * h);
    var queue = [];
    // Start from all 4 corners and edges
    for (var x = 0; x < w; x++) { queue.push(x); queue.push((h-1)*w+x); }
    for (var y = 0; y < h; y++) { queue.push(y*w); queue.push(y*w+w-1); }

    var tolSq = tolerance * tolerance * 3;
    for (var qi = 0; qi < queue.length; qi++) {
      var pos = queue[qi];
      if (pos < 0 || pos >= w*h || visited[pos]) continue;
      var pi = pos * 4;
      var dr = d[pi] - bgR, dg = d[pi+1] - bgG, db = d[pi+2] - bgB;
      var dist = dr*dr + dg*dg + db*db;
      if (dist > tolSq) continue;
      visited[pos] = 1;
      var px = pos % w, py = Math.floor(pos / w);
      if (px > 0) queue.push(pos - 1);
      if (px < w-1) queue.push(pos + 1);
      if (py > 0) queue.push(pos - w);
      if (py < h-1) queue.push(pos + w);
    }

    // Apply transparency with feathering
    for (var i = 0; i < w*h; i++) {
      if (visited[i]) {
        d[i*4+3] = 0;
      }
    }

    // Feather edges
    if (feather > 0) {
      for (var pass = 0; pass < feather; pass++) {
        for (var y = 1; y < h-1; y++) {
          for (var x = 1; x < w-1; x++) {
            var idx = (y*w+x)*4+3;
            if (d[idx] > 0 && d[idx] < 255) continue;
            var neighbors = [
              d[((y-1)*w+x)*4+3], d[((y+1)*w+x)*4+3],
              d[(y*w+x-1)*4+3], d[(y*w+x+1)*4+3]
            ];
            var hasZero = neighbors.some(function(n){return n===0;});
            var hasFull = neighbors.some(function(n){return n===255;});
            if (hasZero && hasFull) {
              d[idx] = 128;
            }
          }
        }
      }
    }

    ctx.putImageData(imgData, 0, 0);
    pushHistory();
    hideLoading();
    showToast('Fondo eliminado', 'success');
  }, 50);
}

function resetToHistory() {
  if (historyIndex > 0) {
    historyIndex--;
    ctx.putImageData(historyStack[historyIndex], 0, 0);
    currentImage = cloneImageData(historyStack[historyIndex]);
  }
}
// === INPAINTING (Remove Objects) ===
function showInpaintPanel() {
  document.getElementById('panelContent').innerHTML =
    '<h3>Eliminar Objetos</h3>' +
    '<div class="panel-section">' +
    '<p style="font-size:11px;color:#aaa;margin-bottom:12px">Pinta sobre el objeto a eliminar (aparecera en rojo). Luego presiona "Rellenar" para eliminarlo.</p>' +
    '<div class="slider-group"><label><span>Tamano del pincel</span><span id="val-brush">' + brushSize + '</span></label>' +
    '<input type="range" min="5" max="80" value="' + brushSize + '" oninput="setBrushSize(parseInt(this.value))"></div>' +
    '</div>' +
    '<button class="btn btn-primary" onclick="applyInpaint()">Rellenar Area</button>' +
    '<button class="btn btn-secondary" onclick="clearMask();showToast(\'Mascara limpiada\',\'info\')">Limpiar Mascara</button>';
  enablePainting();
}

function setBrushSize(size) {
  brushSize = size;
  document.getElementById('val-brush').textContent = size;
  document.getElementById('brushCursor').style.width = size + 'px';
  document.getElementById('brushCursor').style.height = size + 'px';
}

function enablePainting() {
  var c = document.getElementById('mainCanvas');
  maskCanvas.style.pointerEvents = 'auto';
  maskCanvas.style.cursor = 'none';
  document.getElementById('brushCursor').style.display = 'block';

  maskCanvas.onmousedown = function(e) { isPainting = true; paintMask(e); };
  maskCanvas.onmousemove = function(e) {
    var cursor = document.getElementById('brushCursor');
    cursor.style.left = (e.clientX - brushSize/2) + 'px';
    cursor.style.top = (e.clientY - brushSize/2) + 'px';
    cursor.style.width = brushSize + 'px';
    cursor.style.height = brushSize + 'px';
    if (isPainting) paintMask(e);
  };
  maskCanvas.onmouseup = function() { isPainting = false; };
  maskCanvas.onmouseleave = function() { isPainting = false; };
}

function disablePainting() {
  maskCanvas.style.pointerEvents = 'none';
  maskCanvas.style.cursor = 'default';
  maskCanvas.onmousedown = null;
  maskCanvas.onmousemove = null;
  maskCanvas.onmouseup = null;
  document.getElementById('brushCursor').style.display = 'none';
}

function paintMask(e) {
  var rect = maskCanvas.getBoundingClientRect();
  var scaleX = maskCanvas.width / rect.width;
  var scaleY = maskCanvas.height / rect.height;
  var x = (e.clientX - rect.left) * scaleX;
  var y = (e.clientY - rect.top) * scaleY;
  maskCtx.fillStyle = 'rgba(255, 0, 0, 0.4)';
  maskCtx.beginPath();
  maskCtx.arc(x, y, brushSize * scaleX / 2, 0, Math.PI * 2);
  maskCtx.fill();
}

function applyInpaint() {
  showLoading();
  setTimeout(function() {
    var maskImgData = maskCtx.getImageData(0, 0, canvas.width, canvas.height);
    var md = maskImgData.data;
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data;
    var w = canvas.width, h = canvas.height;

    // Build mask (where red channel > 0 in mask)
    var mask = new Uint8Array(w * h);
    var maskCount = 0;
    for (var i = 0; i < w * h; i++) {
      if (md[i*4] > 100 && md[i*4+3] > 50) {
        mask[i] = 1;
        maskCount++;
      }
    }

    if (maskCount === 0) {
      hideLoading();
      showToast('Pinta sobre el area a eliminar primero', 'error');
      return;
    }

    // Context-aware fill: iteratively replace masked pixels with average of non-masked neighbors
    var iterations = 20;
    var result = new Uint8ClampedArray(d);

    for (var iter = 0; iter < iterations; iter++) {
      var changed = false;
      for (var y = 1; y < h-1; y++) {
        for (var x = 1; x < w-1; x++) {
          var idx = y * w + x;
          if (!mask[idx]) continue;
          var rSum = 0, gSum = 0, bSum = 0, count = 0;
          // Sample 8 neighbors
          for (var dy = -1; dy <= 1; dy++) {
            for (var dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              var ni = (y+dy) * w + (x+dx);
              if (!mask[ni]) {
                rSum += result[ni*4];
                gSum += result[ni*4+1];
                bSum += result[ni*4+2];
                count++;
              }
            }
          }
          if (count > 0) {
            result[idx*4] = rSum / count;
            result[idx*4+1] = gSum / count;
            result[idx*4+2] = bSum / count;
            mask[idx] = 0;
            changed = true;
          }
        }
      }
      if (!changed) break;
    }

    // Remaining masked pixels: expand search radius
    for (var y = 0; y < h; y++) {
      for (var x = 0; x < w; x++) {
        var idx = y * w + x;
        if (!mask[idx]) continue;
        var rSum = 0, gSum = 0, bSum = 0, count = 0;
        for (var r = 2; r < 30 && count === 0; r++) {
          for (var dy = -r; dy <= r; dy++) {
            for (var dx = -r; dx <= r; dx++) {
              var ny = y+dy, nx = x+dx;
              if (ny < 0 || ny >= h || nx < 0 || nx >= w) continue;
              var ni = ny * w + nx;
              if (!mask[ni]) {
                rSum += result[ni*4];
                gSum += result[ni*4+1];
                bSum += result[ni*4+2];
                count++;
              }
            }
          }
        }
        if (count > 0) {
          result[idx*4] = rSum / count;
          result[idx*4+1] = gSum / count;
          result[idx*4+2] = bSum / count;
        }
      }
    }

    var newImgData = new ImageData(result, w, h);
    ctx.putImageData(newImgData, 0, 0);

    // Apply slight blur over the filled area to blend better
    // Re-read the masked area and blur it
    var finalData = ctx.getImageData(0, 0, w, h);
    var fd = finalData.data;
    var origMask = maskCtx.getImageData(0, 0, w, h).data;
    for (var y = 2; y < h-2; y++) {
      for (var x = 2; x < w-2; x++) {
        var mi = (y*w+x)*4;
        if (origMask[mi] > 100 && origMask[mi+3] > 50) {
          var rr=0,gg=0,bb=0,cc=0;
          for (var dy=-2;dy<=2;dy++) {
            for (var dx=-2;dx<=2;dx++) {
              var ni=(y+dy)*w+(x+dx);
              rr+=fd[ni*4]; gg+=fd[ni*4+1]; bb+=fd[ni*4+2]; cc++;
            }
          }
          fd[mi]=rr/cc; fd[mi+1]=gg/cc; fd[mi+2]=bb/cc;
        }
      }
    }
    ctx.putImageData(finalData, 0, 0);

    clearMask();
    pushHistory();
    hideLoading();
    showToast('Objeto eliminado', 'success');
  }, 50);
}
// === ENHANCE ===
function showEnhancePanel() {
  document.getElementById('panelContent').innerHTML =
    '<h3>Mejorar Calidad</h3>' +
    '<div class="panel-section">' +
    '<p style="font-size:11px;color:#aaa;margin-bottom:12px">Aplica mejoras automaticas para obtener una imagen mas nitida y vibrante.</p>' +
    '</div>' +
    '<button class="btn btn-primary" onclick="enhanceSharpen()">Nitidez (Sharpen)</button>' +
    '<button class="btn btn-primary" onclick="enhanceAutoLevels()">Auto Niveles</button>' +
    '<button class="btn btn-primary" onclick="enhanceReduceNoise()">Reducir Ruido</button>' +
    '<button class="btn btn-primary" onclick="enhanceSaturation()">Aumentar Color</button>' +
    '<button class="btn btn-primary" onclick="enhanceAll()">Mejora Completa</button>';
}

function enhanceSharpen() {
  showLoading();
  setTimeout(function() {
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data;
    var w = canvas.width, h = canvas.height;
    var copy = new Uint8ClampedArray(d);
    // Unsharp mask kernel
    var amount = 1.5;
    for (var y = 1; y < h-1; y++) {
      for (var x = 1; x < w-1; x++) {
        var i = (y*w+x)*4;
        for (var c = 0; c < 3; c++) {
          var blur = (
            copy[((y-1)*w+x-1)*4+c] + copy[((y-1)*w+x)*4+c]*2 + copy[((y-1)*w+x+1)*4+c] +
            copy[(y*w+x-1)*4+c]*2 + copy[(y*w+x)*4+c]*4 + copy[(y*w+x+1)*4+c]*2 +
            copy[((y+1)*w+x-1)*4+c] + copy[((y+1)*w+x)*4+c]*2 + copy[((y+1)*w+x+1)*4+c]
          ) / 16;
          d[i+c] = Math.max(0, Math.min(255, copy[i+c] + amount * (copy[i+c] - blur)));
        }
      }
    }
    ctx.putImageData(imgData, 0, 0);
    pushHistory();
    hideLoading();
    showToast('Nitidez aplicada', 'success');
  }, 50);
}

function enhanceAutoLevels() {
  showLoading();
  setTimeout(function() {
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data;
    // Find min/max for each channel
    var minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
    for (var i=0; i<d.length; i+=4) {
      if(d[i]<minR)minR=d[i]; if(d[i]>maxR)maxR=d[i];
      if(d[i+1]<minG)minG=d[i+1]; if(d[i+1]>maxG)maxG=d[i+1];
      if(d[i+2]<minB)minB=d[i+2]; if(d[i+2]>maxB)maxB=d[i+2];
    }
    var rangeR=maxR-minR||1, rangeG=maxG-minG||1, rangeB=maxB-minB||1;
    for (var i=0; i<d.length; i+=4) {
      d[i] = ((d[i]-minR)/rangeR)*255;
      d[i+1] = ((d[i+1]-minG)/rangeG)*255;
      d[i+2] = ((d[i+2]-minB)/rangeB)*255;
    }
    ctx.putImageData(imgData, 0, 0);
    pushHistory();
    hideLoading();
    showToast('Auto niveles aplicados', 'success');
  }, 50);
}

function enhanceReduceNoise() {
  showLoading();
  setTimeout(function() {
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data;
    var w = canvas.width, h = canvas.height;
    var copy = new Uint8ClampedArray(d);
    // Median filter 3x3
    for (var y = 1; y < h-1; y++) {
      for (var x = 1; x < w-1; x++) {
        for (var c = 0; c < 3; c++) {
          var vals = [];
          for (var dy=-1;dy<=1;dy++) {
            for (var dx=-1;dx<=1;dx++) {
              vals.push(copy[((y+dy)*w+(x+dx))*4+c]);
            }
          }
          vals.sort(function(a,b){return a-b;});
          d[(y*w+x)*4+c] = vals[4]; // median
        }
      }
    }
    ctx.putImageData(imgData, 0, 0);
    pushHistory();
    hideLoading();
    showToast('Ruido reducido', 'success');
  }, 50);
}

function enhanceSaturation() {
  showLoading();
  setTimeout(function() {
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data;
    var satBoost = 1.3;
    for (var i=0; i<d.length; i+=4) {
      var r=d[i],g=d[i+1],b=d[i+2];
      var gray = 0.2989*r + 0.587*g + 0.114*b;
      d[i] = Math.max(0, Math.min(255, gray + satBoost*(r-gray)));
      d[i+1] = Math.max(0, Math.min(255, gray + satBoost*(g-gray)));
      d[i+2] = Math.max(0, Math.min(255, gray + satBoost*(b-gray)));
    }
    ctx.putImageData(imgData, 0, 0);
    pushHistory();
    hideLoading();
    showToast('Saturacion aumentada', 'success');
  }, 50);
}

function enhanceAll() {
  showLoading();
  setTimeout(function() {
    // Combined: auto levels + slight sharpen + slight saturation boost
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data;
    var w = canvas.width, h = canvas.height;

    // Auto levels
    var minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
    for (var i=0;i<d.length;i+=4) {
      if(d[i]<minR)minR=d[i];if(d[i]>maxR)maxR=d[i];
      if(d[i+1]<minG)minG=d[i+1];if(d[i+1]>maxG)maxG=d[i+1];
      if(d[i+2]<minB)minB=d[i+2];if(d[i+2]>maxB)maxB=d[i+2];
    }
    var rR=maxR-minR||1,rG=maxG-minG||1,rB=maxB-minB||1;
    for(var i=0;i<d.length;i+=4){
      d[i]=((d[i]-minR)/rR)*255;
      d[i+1]=((d[i+1]-minG)/rG)*255;
      d[i+2]=((d[i+2]-minB)/rB)*255;
    }

    // Saturation boost
    for(var i=0;i<d.length;i+=4){
      var gray=0.2989*d[i]+0.587*d[i+1]+0.114*d[i+2];
      d[i]=Math.max(0,Math.min(255,gray+1.2*(d[i]-gray)));
      d[i+1]=Math.max(0,Math.min(255,gray+1.2*(d[i+1]-gray)));
      d[i+2]=Math.max(0,Math.min(255,gray+1.2*(d[i+2]-gray)));
    }
    ctx.putImageData(imgData, 0, 0);

    // Sharpen pass
    var imgData2 = ctx.getImageData(0,0,w,h);
    var d2 = imgData2.data;
    var copy = new Uint8ClampedArray(d2);
    for(var y=1;y<h-1;y++){
      for(var x=1;x<w-1;x++){
        var i=(y*w+x)*4;
        for(var c=0;c<3;c++){
          var blur=(copy[((y-1)*w+x)*4+c]*2+copy[(y*w+x-1)*4+c]*2+copy[(y*w+x)*4+c]*4+copy[(y*w+x+1)*4+c]*2+copy[((y+1)*w+x)*4+c]*2)/12;
          d2[i+c]=Math.max(0,Math.min(255,copy[i+c]+0.8*(copy[i+c]-blur)));
        }
      }
    }
    ctx.putImageData(imgData2, 0, 0);
    pushHistory();
    hideLoading();
    showToast('Mejora completa aplicada', 'success');
  }, 50);
}
// === FILTERS ===
function showFiltersPanel() {
  document.getElementById('panelContent').innerHTML =
    '<h3>Filtros Artisticos</h3>' +
    '<div class="panel-section">' +
    '<div class="filter-grid">' +
    '<button class="filter-btn" onclick="applyFilter(\'bw\')">B/N</button>' +
    '<button class="filter-btn" onclick="applyFilter(\'sepia\')">Sepia</button>' +
    '<button class="filter-btn" onclick="applyFilter(\'contrast\')">Alto Contraste</button>' +
    '<button class="filter-btn" onclick="applyFilter(\'posterize\')">Posterizar</button>' +
    '<button class="filter-btn" onclick="applyFilter(\'vignette\')">Vineta</button>' +
    '<button class="filter-btn" onclick="applyFilter(\'blur\')">Desenfoque</button>' +
    '<button class="filter-btn" onclick="applyFilter(\'vintage\')">Vintage</button>' +
    '<button class="filter-btn" onclick="applyFilter(\'invert\')">Invertir</button>' +
    '</div>' +
    '</div>' +
    '<button class="btn btn-secondary" onclick="resetToHistory()">Deshacer Filtro</button>';
}

function applyFilter(type) {
  showLoading();
  setTimeout(function() {
    // Always apply from current history state
    var src = historyStack[historyIndex];
    ctx.putImageData(src, 0, 0);
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data;
    var w = canvas.width, h = canvas.height;

    if (type === 'bw') {
      for (var i=0;i<d.length;i+=4) {
        var gray = 0.2989*d[i]+0.587*d[i+1]+0.114*d[i+2];
        d[i]=d[i+1]=d[i+2]=gray;
      }
    } else if (type === 'sepia') {
      for (var i=0;i<d.length;i+=4) {
        var r=d[i],g=d[i+1],b=d[i+2];
        d[i]=Math.min(255,r*0.393+g*0.769+b*0.189);
        d[i+1]=Math.min(255,r*0.349+g*0.686+b*0.168);
        d[i+2]=Math.min(255,r*0.272+g*0.534+b*0.131);
      }
    } else if (type === 'contrast') {
      var factor = 2.0;
      for (var i=0;i<d.length;i+=4) {
        d[i]=Math.max(0,Math.min(255,factor*(d[i]-128)+128));
        d[i+1]=Math.max(0,Math.min(255,factor*(d[i+1]-128)+128));
        d[i+2]=Math.max(0,Math.min(255,factor*(d[i+2]-128)+128));
      }
    } else if (type === 'posterize') {
      var levels = 4;
      for (var i=0;i<d.length;i+=4) {
        d[i]=Math.round(d[i]/255*(levels-1))/(levels-1)*255;
        d[i+1]=Math.round(d[i+1]/255*(levels-1))/(levels-1)*255;
        d[i+2]=Math.round(d[i+2]/255*(levels-1))/(levels-1)*255;
      }
    } else if (type === 'vignette') {
      var cx=w/2, cy=h/2;
      var maxDist = Math.sqrt(cx*cx+cy*cy);
      for (var y=0;y<h;y++) {
        for (var x=0;x<w;x++) {
          var dx=x-cx, dy=y-cy;
          var dist = Math.sqrt(dx*dx+dy*dy)/maxDist;
          var factor = 1 - dist*dist*0.7;
          var i=(y*w+x)*4;
          d[i]*=factor; d[i+1]*=factor; d[i+2]*=factor;
        }
      }
    } else if (type === 'blur') {
      var copy = new Uint8ClampedArray(d);
      var radius = 3;
      for (var y=radius;y<h-radius;y++) {
        for (var x=radius;x<w-radius;x++) {
          var rr=0,gg=0,bb=0,cc=0;
          for (var dy=-radius;dy<=radius;dy++) {
            for (var dx=-radius;dx<=radius;dx++) {
              var ni=((y+dy)*w+(x+dx))*4;
              rr+=copy[ni]; gg+=copy[ni+1]; bb+=copy[ni+2]; cc++;
            }
          }
          var i=(y*w+x)*4;
          d[i]=rr/cc; d[i+1]=gg/cc; d[i+2]=bb/cc;
        }
      }
    } else if (type === 'vintage') {
      for (var i=0;i<d.length;i+=4) {
        var r=d[i],g=d[i+1],b=d[i+2];
        d[i]=Math.min(255,r*0.6+g*0.3+b*0.1+40);
        d[i+1]=Math.min(255,r*0.2+g*0.6+b*0.1+20);
        d[i+2]=Math.min(255,r*0.1+g*0.2+b*0.5+10);
      }
      // Add vignette
      var cx2=w/2,cy2=h/2,maxD=Math.sqrt(cx2*cx2+cy2*cy2);
      for(var y=0;y<h;y++){for(var x=0;x<w;x++){
        var dist=Math.sqrt((x-cx2)*(x-cx2)+(y-cy2)*(y-cy2))/maxD;
        var f=1-dist*dist*0.5;
        var i=(y*w+x)*4;d[i]*=f;d[i+1]*=f;d[i+2]*=f;
      }}
    } else if (type === 'invert') {
      for (var i=0;i<d.length;i+=4) {
        d[i]=255-d[i]; d[i+1]=255-d[i+1]; d[i+2]=255-d[i+2];
      }
    }

    ctx.putImageData(imgData, 0, 0);
    pushHistory();
    hideLoading();
    showToast('Filtro aplicado: ' + type, 'success');
  }, 50);
}

// Window resize handler
window.addEventListener('resize', function() {
  if (currentImage) fitCanvas();
});
