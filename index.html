<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Photo Editor Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f0f;color:#e0e0e0;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1a1a2e}
::-webkit-scrollbar-thumb{background:#667eea;border-radius:3px}

.topbar{height:48px;background:#1a1a2e;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;padding:0 16px;justify-content:space-between;z-index:100}
.topbar .logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .actions{display:flex;gap:8px}
.topbar .actions button{background:#2a2a4a;border:none;color:#e0e0e0;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.topbar .actions button:hover{background:#667eea}
.topbar .actions button:disabled{opacity:.4;cursor:not-allowed}

.main-layout{display:flex;height:calc(100vh - 48px)}

.sidebar{width:64px;background:#1a1a2e;border-right:1px solid #2a2a4a;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px}
.sidebar button{width:48px;height:48px;border:none;background:transparent;color:#888;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:20px}
.sidebar button:hover{background:#2a2a4a;color:#e0e0e0}
.sidebar button.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.sidebar button svg{width:22px;height:22px}

.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#0a0a0a}
.canvas-container{position:relative;max-width:100%;max-height:100%;display:flex;align-items:center;justify-content:center}
#mainCanvas{max-width:100%;max-height:calc(100vh - 80px);object-fit:contain;border-radius:4px;cursor:crosshair}
#maskCanvas{position:absolute;top:0;left:0;cursor:crosshair;border-radius:4px}

.drop-zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #667eea;border-radius:12px;margin:20px;background:rgba(102,126,234,.05);transition:all .3s}
.drop-zone.drag-over{background:rgba(102,126,234,.15);border-color:#764ba2}
.drop-zone svg{width:64px;height:64px;color:#667eea;margin-bottom:16px}
.drop-zone p{font-size:16px;color:#888;margin-bottom:8px}
.drop-zone span{font-size:13px;color:#555}

.right-panel{width:280px;background:#1a1a2e;border-left:1px solid #2a2a4a;padding:16px;overflow-y:auto;display:none}
.right-panel.visible{display:block}
.right-panel h3{font-size:14px;font-weight:600;margin-bottom:12px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.right-panel p{font-size:12px;color:#888;margin-bottom:16px;line-height:1.5}
.right-panel .btn-apply{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.right-panel .btn-apply:hover{opacity:.9;transform:translateY(-1px)}
.right-panel .btn-apply:disabled{opacity:.5;cursor:not-allowed;transform:none}
.right-panel label{display:block;font-size:12px;color:#aaa;margin-bottom:6px;margin-top:12px}
.right-panel input[type="range"]{width:100%;accent-color:#667eea}
.right-panel .brush-size-display{text-align:center;font-size:12px;color:#667eea;margin-top:4px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column}
.overlay.visible{display:flex}
.spinner{width:48px;height:48px;border:4px solid #2a2a4a;border-top-color:#667eea;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay p{margin-top:16px;font-size:14px;color:#ccc}

.toast-container{position:fixed;top:60px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;animation:slideIn .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.success{background:#1a4a2e;border:1px solid #2d8a4e;color:#6ee7a0}
.toast.error{background:#4a1a1a;border:1px solid #8a2d2d;color:#e76e6e}
.toast.info{background:#1a2a4a;border:1px solid #2d4a8a;color:#6e9ee7}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

.hidden-input{display:none}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">AI Photo Editor Pro</div>
  <div class="actions">
    <button id="btnUndo" onclick="undo()" disabled title="Deshacer (Ctrl+Z)">&#8630; Deshacer</button>
    <button id="btnRedo" onclick="redo()" disabled title="Rehacer (Ctrl+Shift+Z)">&#8631; Rehacer</button>
    <button onclick="exportImage()" title="Exportar (Ctrl+S)">&#11015; Exportar</button>
  </div>
</div>

<div class="main-layout">
  <div class="sidebar">
    <button id="toolUpload" title="Cargar imagen" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
    <button id="toolBg" title="Eliminar fondo" onclick="selectTool('removeBg')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
    </button>
    <button id="toolRemove" title="Eliminar objetos" onclick="selectTool('removeObj')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </button>
    <button id="toolUpscale" title="Mejorar calidad" onclick="selectTool('upscale')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    </button>
    <button id="toolReimagine" title="Reimaginar" onclick="selectTool('reimagine')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </button>
  </div>

  <div class="canvas-area" id="canvasArea">
    <div class="drop-zone" id="dropZone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p>Arrastra una imagen aqui</p>
      <span>o haz clic para seleccionar un archivo</span>
    </div>
    <div class="canvas-container" id="canvasContainer" style="display:none">
      <canvas id="mainCanvas"></canvas>
      <canvas id="maskCanvas"></canvas>
    </div>
  </div>

  <div class="right-panel" id="rightPanel">
    <div id="panelContent"></div>
  </div>
</div>

<div class="overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p id="loadingText">Procesando con IA...</p>
</div>

<div class="toast-container" id="toastContainer"></div>

<input type="file" id="fileInput" class="hidden-input" accept="image/*" onchange="handleFileSelect(event)">

<script>
const API_KEY = '1646d08f28dd476a4f6129e0b14064a86e5ca9035419d45573d636e9d71939014a498249d0af2d7386afa70ecdf4bb1a';
const PROXY = 'https://corsproxy.io/?';
const ENDPOINTS = {
  removeBg: 'https://clipdrop-api.co/remove-background/v1',
  removeObj: 'https://clipdrop-api.co/cleanup/v1',
  upscale: 'https://clipdrop-api.co/image-upscaling/v2',
  reimagine: 'https://clipdrop-api.co/reimagine/v1/reimagine'
};

async function apiCall(endpoint, formData) {
  // Try direct call first
  try {
    var response = await fetch(endpoint, {
      method: 'POST',
      headers: { 'x-api-key': API_KEY },
      body: formData
    });
    if (response.ok) return response;
  } catch(e) {}
  // Fallback: try multiple CORS proxies
  var proxies = [
    'https://corsproxy.io/?',
    'https://proxy.cors.sh/',
    'https://cors-anywhere.herokuapp.com/'
  ];
  for (var i = 0; i < proxies.length; i++) {
    try {
      var url = proxies[i] + endpoint;
      var response = await fetch(url, {
        method: 'POST',
        headers: { 'x-api-key': API_KEY },
        body: formData
      });
      if (response.ok) return response;
    } catch(e) { continue; }
  }
  throw new Error('No se pudo conectar con la API. Intenta recargar la pagina.');
}

let currentTool = null;
let imageLoaded = false;
let history = [];
let historyIndex = -1;
let isDrawing = false;
let brushSize = 30;
let originalImage = null;

const mainCanvas = document.getElementById('mainCanvas');
const maskCanvas = document.getElementById('maskCanvas');
const mainCtx = mainCanvas.getContext('2d');
const maskCtx = maskCanvas.getContext('2d');

function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 4000);
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Procesando con IA...';
  document.getElementById('loadingOverlay').classList.add('visible');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('visible');
}

function saveState() {
  if (historyIndex < history.length - 1) {
    history = history.slice(0, historyIndex + 1);
  }
  history.push(mainCanvas.toDataURL('image/png'));
  historyIndex++;
  if (history.length > 30) {
    history.shift();
    historyIndex--;
  }
  updateUndoRedo();
}

function updateUndoRedo() {
  document.getElementById('btnUndo').disabled = historyIndex <= 0;
  document.getElementById('btnRedo').disabled = historyIndex >= history.length - 1;
}

function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    loadFromHistory();
  }
}

function redo() {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    loadFromHistory();
  }
}

function loadFromHistory() {
  const img = new Image();
  img.onload = function() {
    mainCanvas.width = img.width;
    mainCanvas.height = img.height;
    mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    mainCtx.drawImage(img, 0, 0);
    syncMaskSize();
    updateUndoRedo();
  };
  img.src = history[historyIndex];
}

function syncMaskSize() {
  maskCanvas.width = mainCanvas.width;
  maskCanvas.height = mainCanvas.height;
  maskCanvas.style.width = mainCanvas.offsetWidth + 'px';
  maskCanvas.style.height = mainCanvas.offsetHeight + 'px';
  maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const maxW = window.innerWidth - 344 - 40;
      const maxH = window.innerHeight - 88;
      let w = img.width;
      let h = img.height;
      if (w > maxW || h > maxH) {
        const ratio = Math.min(maxW / w, maxH / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      mainCanvas.width = w;
      mainCanvas.height = h;
      mainCtx.drawImage(img, 0, 0, w, h);
      originalImage = img;
      syncMaskSize();
      document.getElementById('dropZone').style.display = 'none';
      document.getElementById('canvasContainer').style.display = 'flex';
      imageLoaded = true;
      history = [];
      historyIndex = -1;
      saveState();
      showToast('Imagen cargada correctamente', 'success');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) loadImage(file);
  e.target.value = '';
}

// Drag and drop
const dropZone = document.getElementById('dropZone');
const canvasArea = document.getElementById('canvasArea');
canvasArea.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
canvasArea.addEventListener('dragleave', function(e) { e.preventDefault(); dropZone.classList.remove('drag-over'); });
canvasArea.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});
dropZone.addEventListener('click', function() { document.getElementById('fileInput').click(); });

function selectTool(tool) {
  if (!imageLoaded) { showToast('Carga una imagen primero', 'error'); return; }
  document.querySelectorAll('.sidebar button').forEach(function(b) { b.classList.remove('active'); });
  currentTool = tool;
  var btnId = { removeBg:'toolBg', removeObj:'toolRemove', upscale:'toolUpscale', reimagine:'toolReimagine' };
  if (btnId[tool]) document.getElementById(btnId[tool]).classList.add('active');

  var panel = document.getElementById('rightPanel');
  var content = document.getElementById('panelContent');
  panel.classList.add('visible');

  if (tool === 'removeBg') {
    content.innerHTML = '<h3>Eliminar Fondo</h3><p>Elimina automaticamente el fondo de la imagen usando IA. Ideal para productos, retratos y objetos.</p><button class="btn-apply" onclick="applyRemoveBg()">Aplicar</button>';
    maskCanvas.style.pointerEvents = 'none';
    clearMask();
  } else if (tool === 'removeObj') {
    content.innerHTML = '<h3>Eliminar Objetos</h3><p>Pinta sobre los objetos que deseas eliminar. La zona pintada de rojo sera removida por la IA.</p><label>Tamano del pincel</label><input type="range" min="5" max="100" value="' + brushSize + '" oninput="updateBrush(this.value)"><div class="brush-size-display" id="brushDisplay">' + brushSize + 'px</div><button class="btn-apply" onclick="applyRemoveObj()" style="margin-top:16px">Aplicar</button><button class="btn-apply" onclick="clearMask()" style="margin-top:8px;background:#2a2a4a">Limpiar mascara</button>';
    maskCanvas.style.pointerEvents = 'auto';
  } else if (tool === 'upscale') {
    content.innerHTML = '<h3>Mejorar Calidad</h3><p>Aumenta la resolucion de la imagen usando IA. Escala la imagen al doble de su tamano actual.</p><button class="btn-apply" onclick="applyUpscale()">Aplicar (2x)</button>';
    maskCanvas.style.pointerEvents = 'none';
    clearMask();
  } else if (tool === 'reimagine') {
    content.innerHTML = '<h3>Reimaginar</h3><p>Genera una variacion creativa de tu imagen usando IA. Cada vez obtendras un resultado diferente.</p><button class="btn-apply" onclick="applyReimagine()">Aplicar</button>';
    maskCanvas.style.pointerEvents = 'none';
    clearMask();
  }

  setTimeout(function() {
    maskCanvas.style.width = mainCanvas.offsetWidth + 'px';
    maskCanvas.style.height = mainCanvas.offsetHeight + 'px';
  }, 50);
}

function updateBrush(val) {
  brushSize = parseInt(val);
  document.getElementById('brushDisplay').textContent = brushSize + 'px';
}

function clearMask() {
  maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
}

// Mask drawing
maskCanvas.addEventListener('mousedown', function(e) {
  if (currentTool !== 'removeObj') return;
  isDrawing = true;
  drawOnMask(e);
});
maskCanvas.addEventListener('mousemove', function(e) {
  if (!isDrawing) return;
  drawOnMask(e);
});
maskCanvas.addEventListener('mouseup', function() { isDrawing = false; });
maskCanvas.addEventListener('mouseleave', function() { isDrawing = false; });

function drawOnMask(e) {
  const rect = maskCanvas.getBoundingClientRect();
  const scaleX = maskCanvas.width / rect.width;
  const scaleY = maskCanvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  maskCtx.beginPath();
  maskCtx.arc(x, y, brushSize * scaleX, 0, Math.PI * 2);
  maskCtx.fillStyle = 'rgba(255, 0, 0, 0.4)';
  maskCtx.fill();
}

function getCanvasBlob() {
  return new Promise(function(resolve) {
    mainCanvas.toBlob(function(blob) { resolve(blob); }, 'image/png');
  });
}

function getMaskBlob() {
  return new Promise(function(resolve) {
    var tempCanvas = document.createElement('canvas');
    tempCanvas.width = maskCanvas.width;
    tempCanvas.height = maskCanvas.height;
    var ctx = tempCanvas.getContext('2d');
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
    var imageData = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height);
    var data = imageData.data;
    var outData = ctx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
    var out = outData.data;
    for (var i = 0; i < data.length; i += 4) {
      if (data[i] > 100 && data[i+3] > 0) {
        out[i] = 255;
        out[i+1] = 255;
        out[i+2] = 255;
        out[i+3] = 255;
      }
    }
    ctx.putImageData(outData, 0, 0);
    tempCanvas.toBlob(function(blob) { resolve(blob); }, 'image/png');
  });
}

function loadResultImage(blob) {
  var url = URL.createObjectURL(blob);
  var img = new Image();
  img.onload = function() {
    mainCanvas.width = img.width;
    mainCanvas.height = img.height;
    mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    mainCtx.drawImage(img, 0, 0);
    syncMaskSize();
    saveState();
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

async function applyRemoveBg() {
  showLoading('Eliminando fondo...');
  try {
    var blob = await getCanvasBlob();
    var formData = new FormData();
    formData.append('image_file', blob, 'image.png');
    var response = await apiCall(ENDPOINTS.removeBg, formData);
    if (!response.ok) throw new Error('Error ' + response.status + ': ' + await response.text());
    var resultBlob = await response.blob();
    loadResultImage(resultBlob);
    showToast('Fondo eliminado correctamente', 'success');
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
  }
  hideLoading();
}

async function applyRemoveObj() {
  var maskData = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height).data;
  var hasMask = false;
  for (var i = 0; i < maskData.length; i += 4) {
    if (maskData[i] > 100 && maskData[i+3] > 0) { hasMask = true; break; }
  }
  if (!hasMask) { showToast('Pinta sobre los objetos a eliminar primero', 'error'); return; }
  showLoading('Eliminando objetos...');
  try {
    var imgBlob = await getCanvasBlob();
    var mskBlob = await getMaskBlob();
    var formData = new FormData();
    formData.append('image_file', imgBlob, 'image.png');
    formData.append('mask_file', mskBlob, 'mask.png');
    var response = await apiCall(ENDPOINTS.removeObj, formData);
    if (!response.ok) throw new Error('Error ' + response.status + ': ' + await response.text());
    var resultBlob = await response.blob();
    loadResultImage(resultBlob);
    clearMask();
    showToast('Objetos eliminados correctamente', 'success');
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
  }
  hideLoading();
}

async function applyUpscale() {
  showLoading('Mejorando calidad...');
  try {
    var blob = await getCanvasBlob();
    var tw = mainCanvas.width * 2;
    var th = mainCanvas.height * 2;
    var formData = new FormData();
    formData.append('image_file', blob, 'image.png');
    formData.append('target_width', tw.toString());
    formData.append('target_height', th.toString());
    var response = await apiCall(ENDPOINTS.upscale, formData);
    if (!response.ok) throw new Error('Error ' + response.status + ': ' + await response.text());
    var resultBlob = await response.blob();
    loadResultImage(resultBlob);
    showToast('Imagen mejorada a ' + tw + 'x' + th, 'success');
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
  }
  hideLoading();
}

async function applyReimagine() {
  showLoading('Reimaginando imagen...');
  try {
    var blob = await getCanvasBlob();
    var formData = new FormData();
    formData.append('image_file', blob, 'image.png');
    var response = await apiCall(ENDPOINTS.reimagine, formData);
    if (!response.ok) throw new Error('Error ' + response.status + ': ' + await response.text());
    var resultBlob = await response.blob();
    loadResultImage(resultBlob);
    showToast('Imagen reimaginada correctamente', 'success');
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
  }
  hideLoading();
}

function exportImage() {
  if (!imageLoaded) { showToast('No hay imagen para exportar', 'error'); return; }
  var link = document.createElement('a');
  link.download = 'ai-editor-export.png';
  link.href = mainCanvas.toDataURL('image/png');
  link.click();
  showToast('Imagen exportada', 'success');
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.shiftKey && (e.key === 'Z' || e.key === 'z')) { e.preventDefault(); redo(); }
  if (e.ctrlKey && (e.key === 's' || e.key === 'S')) { e.preventDefault(); exportImage(); }
});

// Resize handler
window.addEventListener('resize', function() {
  if (imageLoaded) {
    setTimeout(function() {
      maskCanvas.style.width = mainCanvas.offsetWidth + 'px';
      maskCanvas.style.height = mainCanvas.offsetHeight + 'px';
    }, 100);
  }
});
</script>
</body>
</html>
